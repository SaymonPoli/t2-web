<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>PouchDB Sync - Professor</title>
        <script type="text/javascript" src="rede.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/pouchdb/dist/pouchdb.min.js"></script>
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
        <style>
            body {
                font-family: sans-serif;
                margin: 20px;
            }
            .area-botoes {
                margin-bottom: 20px;
            }
            button {
                margin-right: 10px;
                padding: 5px 10px;
                cursor: pointer;
            }
            .disciplina-item {
                border: 1px solid #ccc;
                padding: 10px;
                margin-top: 10px;
                max-width: 400px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .status-conexao {
                margin-top: 20px;
                font-size: 0.9em;
                color: #666;
            }
        </style>
    </head>

    <body>
        <div id="app">
            <div class="area-botoes">
                <button @click="login">Login</button>
                <button @click="sincronizar">Sincronizar</button>
                <button @click="configura">Inicia Semestre</button>
            </div>

            <div v-if="listaDisciplinasNomes.length > 0">
                <h3>Minhas Disciplinas</h3>
                <div
                    v-for="nome in listaDisciplinasNomes"
                    :key="nome"
                    class="disciplina-item"
                >
                    <span>{{ nome }}</span>
                    <button @click="selecionarDisciplina(nome)">Chamada</button>
                </div>
            </div>

            <div class="status-conexao">
                Status: {{ isOnline ? 'Online' : 'Offline' }}
            </div>
        </div>

        <script>
            const { createApp } = Vue;
            const nomesDisciplinas = new PouchDB("lista");

            createApp({
                data() {
                    return {
                        listaDisciplinasNomes: [],
                        isOnline: navigator.onLine,
                        disciplinaSelecionada: null,
                    };
                },
                async mounted() {
                    window.addEventListener(
                        "online",
                        () => (this.isOnline = true),
                    );
                    window.addEventListener(
                        "offline",
                        () => (this.isOnline = false),
                    );
                    await this.qtdDisciplinas();
                },
                methods: {
                    // --- Funções Originais Mantidas/Adaptadas ---
                    async login() {
                        const dados = await POST("/login", {
                            email: "fabio@ufsc.br",
                            senha: "123",
                        });
                        token = dados.token;
                        console.log("TOKEN:", token);
                    },

                    async configura() {
                        let lista = await this.obtemListaDisciplinasServidor();
                        if (lista) {
                            console.log("* Remove todos os dados");
                            let x = await this.obtemListaBDlocal();
                            await this.removeBDlocais(x);
                            await this.atualizaLista(lista);

                            console.log("* Obtem dados do servidor");
                            for (let a = 0; a < lista.length; a++) {
                                let dados = await this.dadosDisciplina(
                                    lista[a],
                                );
                                await this.criaBancoDados(lista[a], dados);
                            }
                            await this.qtdDisciplinas();
                        } else {
                            console.log("Voce nao tem acesso ao sistema");
                        }
                    },

                    async sincronizar() {
                        console.log("Sincronização global iniciada...");
                        // Lógica de sincronização será detalhada no Commit 5
                    },

                    async obtemListaBDlocal() {
                        let result = await nomesDisciplinas.allDocs({
                            include_docs: true,
                        });
                        try {
                            return result.rows[0].doc.lista;
                        } catch (e) {
                            return [];
                        }
                    },

                    async removeBDlocais(lista) {
                        if (!lista) return;
                        for (let a = 0; a < lista.length; a++) {
                            try {
                                let db = new PouchDB(lista[a]);
                                await db.destroy();
                            } catch (e) {
                                console.log("Erro removendo:" + lista[a]);
                            }
                        }
                    },

                    async atualizaLista(lista) {
                        let doc = { _id: "0", lista: lista };
                        try {
                            const existente = await nomesDisciplinas.get(
                                doc._id,
                            );
                            doc._rev = existente._rev;
                            await nomesDisciplinas.put(doc);
                        } catch (err) {
                            if (err.status === 404)
                                await nomesDisciplinas.put(doc);
                            else console.error(err);
                        }
                    },

                    async dadosDisciplina(nome) {
                        return await GET("/disciplinas/" + nome);
                    },

                    async criaBancoDados(bd, dados) {
                        // Inicializa o banco local PouchDB para a disciplina
                        new PouchDB(bd);
                    },

                    async obtemListaDisciplinasServidor() {
                        try {
                            return await GET("/disciplinas");
                        } catch (e) {
                            console.log("Erro ao buscar lista: " + e);
                            return null;
                        }
                    },

                    async qtdDisciplinas() {
                        try {
                            let resultado = await nomesDisciplinas.allDocs({
                                include_docs: true,
                            });
                            this.listaDisciplinasNomes =
                                resultado.rows[0].doc.lista;
                            console.log(
                                "Disciplinas locais:",
                                this.listaDisciplinasNomes.length,
                            );
                        } catch (e) {
                            this.listaDisciplinasNomes = [];
                        }
                    },

                    selecionarDisciplina(nome) {
                        alert("Abrindo chamada de: " + nome);
                    },
                },
            }).mount("#app");
        </script>
    </body>
</html>
