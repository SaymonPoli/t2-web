<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Sistema de Presença</title>
        <script src="rede.js"></script>
        <script src="/scripts/pouchdb/pouchdb.min.js"></script>
        <script src="/scripts/vue/vue.global.js"></script>
    </head>
    <body>
        <div id="app">
            <login v-if="!autenticado" @login-sucesso="onLogin"></login>
            <div v-else>
                <div class="header-dash">
                    <h2 style="margin: 0">Painel do Professor</h2>
                    <button class="btn-logout" @click="logout">Sair</button>
                </div>
                <dashboard
                    v-if="!disciplinaSelecionada"
                    :disciplinas="listaDisciplinasNomes"
                    @selecionar="disciplinaSelecionada = $event"
                    @configurar="configurar"
                    @sincronizar="sincronizar"
                >
                </dashboard>
                <chamada
                    v-else
                    :disciplina="disciplinaSelecionada"
                    @voltar="disciplinaSelecionada = null"
                    @salvo="onSalvo"
                >
                </chamada>
                <div class="status-conexao">
                    Rede:
                    <span
                        :style="{ color: isOnline ? 'green' : 'red', fontWeight: 'bold' }"
                        >{{ isOnline ? 'ONLINE' : 'OFFLINE' }}</span
                    >
                    <span
                        v-if="sincronizacaoPendente"
                        style="
                            margin-left: 15px;
                            color: #e67e22;
                            font-weight: bold;
                        "
                        >⚠️ Pendente</span
                    >
                    <span
                        v-else
                        style="
                            margin-left: 15px;
                            color: #2ecc71;
                            font-weight: bold;
                        "
                        >✅ Sincronizado</span
                    >
                </div>
            </div>
        </div>
        <script src="js/components/Login.js"></script>
        <script src="js/components/Dashboard.js"></script>
        <script src="js/components/Chamada.js"></script>
        <script src="js/app.js"></script>
    </body>
</html>
